<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIFT Auth System</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Sans&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050507;
--neon:#00ff88;
--blue:#00c8ff;
--text:#e8eaf0;
--muted:rgba(232,234,240,0.5);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg);
color:var(--text);
font-family:'DM Sans',sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* animated bg */
body::before{
content:"";
position:absolute;
inset:0;
background-image:
linear-gradient(rgba(0,255,136,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,136,0.05) 1px, transparent 1px);
background-size:50px 50px;
animation:gridMove 20s linear infinite;
}

@keyframes gridMove{
from{transform:translateY(0)}
to{transform:translateY(50px)}
}

.container{
position:relative;
width:420px;
padding:40px;
border-radius:24px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 0 80px rgba(0,255,136,0.15);
text-align:center;
}

.logo{
font-family:'Bebas Neue';
font-size:2rem;
margin-bottom:10px;
background:linear-gradient(135deg,var(--neon),var(--blue));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.title{
font-family:'Bebas Neue';
font-size:48px;
}

.subtitle{
color:var(--muted);
margin-bottom:25px;
}

.input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(255,255,255,0.02);
color:white;
}

.input:focus{
border-color:var(--neon);
box-shadow:0 0 10px rgba(0,255,136,0.4);
outline:none;
}

.btn{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:40px;
background:linear-gradient(135deg,var(--neon),#00d4a0);
color:#050507;
font-weight:700;
cursor:pointer;
}

.switch{
margin-top:15px;
font-size:0.9rem;
color:var(--muted);
}

.switch span{
color:var(--neon);
cursor:pointer;
}

.loader{
display:none;
margin-top:15px;
}

.circle{
width:40px;height:40px;
border:3px solid rgba(0,255,136,0.2);
border-top:3px solid var(--neon);
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{to{transform:rotate(360deg)}}

.success{
display:none;
margin-top:15px;
color:var(--neon);
}

.error{
display:none;
color:#ff5050;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">AIFT</div>
<div class="title" id="title">LOGIN</div>
<div class="subtitle" id="subtitle">Enter AI System</div>

<input type="email" id="email" class="input" placeholder="Email">
<input type="password" id="password" class="input" placeholder="Password">

<div class="error" id="error">Error</div>

<button class="btn" onclick="handleAuth()" id="btn">ENTER SYSTEM</button>

<div class="loader" id="loader"><div class="circle"></div></div>
<div class="success" id="success">SUCCESS 🚀</div>

<div class="switch">
<span onclick="toggleMode()" id="toggleText">New user? Create Account</span>
</div>

</div>

<script>
let mode='login';

function toggleMode(){
mode = mode === 'login' ? 'signup' : 'login';

document.getElementById('title').innerText = mode==='login' ? 'LOGIN' : 'SIGN UP';
document.getElementById('btn').innerText = mode==='login' ? 'ENTER SYSTEM' : 'CREATE ACCOUNT';
document.getElementById('toggleText').innerText = mode==='login' ? 'New user? Create Account' : 'Already have account? Login';
}

function handleAuth(){
const email=document.getElementById('email').value;
const pass=document.getElementById('password').value;

const loader=document.getElementById('loader');
const success=document.getElementById('success');
const error=document.getElementById('error');

loader.style.display='block';
error.style.display='none';

setTimeout(()=>{
loader.style.display='none';

if(mode==='signup'){
localStorage.setItem('user',JSON.stringify({email,password:pass}));
success.innerText='Account Created 🚀';
success.style.display='block';
setTimeout(()=>{window.location.href='dashboard.html'},1200);
}

if(mode==='login'){
const user=JSON.parse(localStorage.getItem('user'));
if(user && user.email===email && user.password===pass){
success.innerText='Access Granted 🚀';
success.style.display='block';
setTimeout(()=>{window.location.href='dashboard.html'},1200);
}else{
error.style.display='block';
error.innerText='Invalid Credentials';
}
}

},1200);
}
</script>

</body>
</html>
