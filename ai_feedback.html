<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time Feedback</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Sans&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black:#050507;
      --deep:#0a0a0f;
      --panel:rgba(255,255,255,0.035);
      --border:rgba(255,255,255,0.08);
      --neon-g:#00ff88;
      --neon-r:#ff3c3c;
      --text:#e8eaf0;
      --muted:rgba(232,234,240,0.45);
      --font-display:'Bebas Neue',sans-serif;
      --font-heading:'Syne',sans-serif;
      --font-body:'DM Sans',sans-serif;
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      background:var(--black);
      color:var(--text);
      font-family:var(--font-body);
    }

    nav{
      position:fixed;top:0;width:100%;z-index:100;
      padding:20px 60px;
      display:flex;justify-content:space-between;
      backdrop-filter:blur(18px);
      background:rgba(5,5,7,0.6);
      border-bottom:1px solid var(--border);
    }

    .logo{
      font-family:var(--font-display);
      font-size:1.6rem;
      background:linear-gradient(135deg,var(--neon-g),#00c8ff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }

    #hero{
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      text-align:center;padding:120px 20px;
    }

    .hero-content{max-width:900px}

    .hero-badge{
      font-family:var(--font-heading);
      color:var(--neon-g);
      margin-bottom:20px;
    }

    .hero-headline{
      font-family:var(--font-display);
      font-size:clamp(4rem,10vw,8rem);
      line-height:0.9;
      margin-bottom:20px;
      background:linear-gradient(160deg,#fff, var(--neon-g));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .hero-sub{
      color:var(--muted);
      margin-bottom:30px;
    }

    .btn{
      padding:15px 40px;
      background:var(--neon-g);
      color:black;
      border:none;
      border-radius:40px;
      font-weight:bold;
      cursor:pointer;
    }

    .feedback-box{
      margin-top:40px;
      padding:30px;
      border-radius:20px;
      background:var(--panel);
      border:1px solid var(--border);
      backdrop-filter:blur(10px);
      font-size:1.5rem;
    }

    .good{color:var(--neon-g)}
    .bad{color:var(--neon-r)}

  </style>
</head>

<body>

<nav>
  <div class="logo">AIFT</div>
</nav>

<section id="hero">
  <div class="hero-content">

    <div class="hero-badge">⚡ Real-Time Feedback</div>

    <h1 class="hero-headline">TRAIN WITH<br>LIVE FEEDBACK</h1>

    <p class="hero-sub">AI analyzes your movement and gives instant corrections.</p>

    <button class="btn" onclick="startFeedback()">Start Feedback</button>

    <div id="feedbackBox" class="feedback-box">Waiting for input...</div>

  </div>
</section>

<script>
function startFeedback(){
  const box = document.getElementById("feedbackBox");

  setInterval(()=>{
    const r = Math.random();

    if(r > 0.5){
      box.innerHTML = '<span class="good">Perfect Form 👍</span>';
    } else {
      box.innerHTML = '<span class="bad">Adjust Posture 👇</span>';
    }

  },1500);
}

// test logs
console.log("Feedback page loaded ✅");
console.assert(typeof startFeedback === 'function', 'startFeedback missing');
</script>

</body>
</html>
