<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardio Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700&family=DM+Sans&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050507;
  --panel:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --green:#00ff88;
  --red:#ff3c3c;
  --text:#e8eaf0;
  --muted:rgba(232,234,240,0.5);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans';
}

nav{
  position:fixed;
  width:100%;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.6);
}

.logo{
  font-family:'Bebas Neue';
  color:var(--green);
}

section{
  padding:100px 20px;
}

.hero{
  text-align:center;
}

.hero h1{
  font-family:'Bebas Neue';
  font-size:70px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  padding:20px;
  border-radius:15px;
}

.timer{
  text-align:center;
  font-size:40px;
  margin-top:20px;
}

.btn{
  padding:15px 30px;
  background:var(--green);
  border:none;
  margin-top:20px;
  cursor:pointer;
}

.stats{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.stat{background:var(--panel);padding:15px;border-radius:10px}

</style>
</head>

<body>

<nav>
  <div class="logo">AIFT</div>
  <a href="index.html" style="color:white">Back</a>
</nav>

<section class="hero">
  <h1>CARDIO ENGINE</h1>
  <p>Burn fat, build endurance with AI</p>
</section>

<section>
<h2>🏃 Cardio Types</h2>
<div class="grid">
  <div class="card" onclick="selectType('running')">Running</div>
  <div class="card" onclick="selectType('hiit')">HIIT</div>
  <div class="card" onclick="selectType('cycling')">Cycling</div>
</div>
</section>

<section>
<h2>⏱ Session Timer</h2>
<div class="timer" id="time">00:00</div>
<button class="btn" onclick="startTimer()">Start Cardio</button>
</section>

<section>
<h2>🔥 Stats</h2>
<div class="stats">
  <div class="stat">Calories: <span id="cal">0</span></div>
  <div class="stat">Heart Rate: <span id="hr">80</span></div>
</div>
</section>

<section>
<h2>💡 AI Tip</h2>
<div class="card" id="tip">Consistency beats intensity</div>
</section>

<script>
let seconds=0;
let running=false;

function startTimer(){
  if(running) return;
  running=true;

  setInterval(()=>{
    seconds++;
    let m=Math.floor(seconds/60);
    let s=seconds%60;

    document.getElementById('time').innerText=
      (m<10?'0'+m:m)+":"+(s<10?'0'+s:s);

    document.getElementById('cal').innerText=Math.floor(seconds*0.5);
    document.getElementById('hr').innerText=80+Math.floor(Math.random()*40);

  },1000);
}

function selectType(type){
  alert(type+" selected");
}

console.log("Cardio Page Loaded");
</script>

</body>
</html>
